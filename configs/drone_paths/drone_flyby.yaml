name: drone_flyby

description: >
  Microdrone camera path through a rectangular room, including translation and orientation keyframes.

camera_path:
  - frame: 1
    position: [0.0, 0.0, 0.0]
  - frame: 45
    position: [0.65, 0.0, -1.8]
  - frame: 90
    position: [-0.65, 0.0, -3.2]
  - frame: 135
    position: [0.6, 0.0, -4.6]
  - frame: 180
    position: [-0.6, 0.0, -6.0]
  - frame: 240
    position: [0.0, 0.0, -7.4]

segment_names:
  - "Approach plane"
  - "Plane to cube"
  - "Cube to cylinder"
  - "Cylinder to sphere"
  - "Sphere exit"

camera_rotation:
  - frame: 1
    rotation_deg: [0.0, 0.0, 0.0]
  - frame: 45
    rotation_deg: [0.0, 16.0, 0.0]
  - frame: 90
    rotation_deg: [0.0, -16.0, 0.0]
  - frame: 135
    rotation_deg: [0.0, 14.0, 0.0]
  - frame: 180
    rotation_deg: [0.0, -14.0, 0.0]
  - frame: 240
    rotation_deg: [0.0, 0.0, 0.0]

rotation_segment_names:
  - "Turn toward plane"
  - "Turn from plane toward cube"
  - "Turn from cube toward cylinder"
  - "Turn from cylinder toward sphere"
  - "Return to forward heading"
