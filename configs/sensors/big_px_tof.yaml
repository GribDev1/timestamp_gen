name: big_px_tof
source: simulation experiment
notes: Big 1x1 SPAD-style ToF simulation sensor

tof:
  height: 1
  width: 1

camera:
  focal_length_mm: 24.0
  sensor_width_mm: 36.0
  sensor_height_mm: 18.0
  wavelength_nm: null

depth:
  min_valid_depth_m: 0.01
  max_valid_depth_m: 10.0

timing:
  laser_rate_hz: 10000000.0
  block_size_L: 100000
  timing_jitter_std_s: 0.0

histogram:
  num_bins: 256
  min_depth_m: 4.0
  max_depth_m: 8.0

detection:
  detection_probability_rho: 1.0

constants:
  c_light: 299792458.0